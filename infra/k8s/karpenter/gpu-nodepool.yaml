# =============================================================================
# Karpenter NodePool — GPU Auto-Scaling (Scale-to-Zero)
# =============================================================================
# Provisions g4dn spot instances when GPU pods are pending.
# Terminates empty nodes after 10 minutes of no GPU pods.
#
# Prerequisites: Install Karpenter via scripts/setup-karpenter.sh
# =============================================================================

apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: gpu
spec:
  template:
    metadata:
      labels:
        node-type: gpu
    spec:
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["g4dn.xlarge", "g4dn.2xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]  # Prefer spot (70% cheaper)
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      taints:
        - key: nvidia.com/gpu
          value: "present"
          effect: NoSchedule
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: gpu

  disruption:
    # Scale to zero: consolidate empty nodes after idle timeout
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10m

  # Limit total GPU nodes
  limits:
    cpu: "8"          # Max 8 vCPU across all GPU nodes
    nvidia.com/gpu: "1"  # Max 1 GPU total

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: gpu
spec:
  amiFamily: AL2  # Amazon Linux 2 with GPU drivers
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: medexrag
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: medexrag
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi  # Room for Docker images + model cache
        volumeType: gp3
        deleteOnTermination: true
