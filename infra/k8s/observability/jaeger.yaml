# =============================================================================
# Jaeger — Distributed Tracing
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: medexrag
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      nodeSelector:
        node-type: cpu
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.51
          ports:
            - name: ui
              containerPort: 16686
            - name: collector
              containerPort: 14268
            - name: otlp-grpc
              containerPort: 4317
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: medexrag
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: collector
      port: 14268
      targetPort: 14268
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
  selector:
    app: jaeger
