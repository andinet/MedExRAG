# =============================================================================
# CI Pipeline — Code Quality Checks
# =============================================================================
#
# PURPOSE: Ensures code quality on every push/PR (linting, tests, Docker validation).
#
# HOW GITHUB ACTIONS WORKS:
#   - GitHub auto-discovers every .yml file in .github/workflows/
#   - Each file is an independent workflow with its own triggers (the "on:" block)
#   - This workflow runs on EVERY push/PR (no path filter = all file changes)
#   - deploy-eks.yml reuses this workflow via "uses: ./.github/workflows/ci.yml"
#     (that's the "workflow_call" feature — one workflow calling another)
#
# TRIGGER CONDITIONS:
#   1. Push to main/develop — runs on every push (no path filter)
#   2. Pull request to main — runs on every PR
#
# JOB DEPENDENCY GRAPH:
#   lint (black, isort, flake8)
#     ├──→ test (pytest — no GPU/models needed)
#     └──→ docker-build (validate Dockerfiles)
#
# =============================================================================

name: CI Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS: When does this workflow run?
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]    # Every push to these branches
  pull_request:
    branches: [main]             # Every PR targeting main

# ─────────────────────────────────────────────────────────────────────────────
# Jobs: What tasks to run?
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ===========================================================================
  # Job 1: Linting & Code Style
  # ===========================================================================
  # Runs fast checks to ensure code follows project standards
  # This job runs first and blocks other jobs if it fails
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python with pip caching for faster installs
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Step 3: Install linting tools
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      # Step 4: Check code formatting with black
      - name: Check formatting (black)
        run: black --check --diff src/medexrag/

      # Step 5: Check import sorting with isort
      - name: Check import sorting (isort)
        run: isort --check-only --diff src/medexrag/

      # Step 6: Run flake8 linter (config in .flake8 at repo root)
      - name: Lint with flake8
        run: flake8 src/medexrag/

  # ===========================================================================
  # Job 2: Unit Tests
  # ===========================================================================
  # Runs lightweight tests that don't require ML models or GPU
  # Only runs if linting passes (needs: lint)
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint  # Wait for lint job to pass

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python with pip caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Step 3: Install test dependencies (minimal - no ML models)
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install langchain langchain-core langchain-community langgraph
          pip install pydantic chromadb
          pip install langchain-text-splitters langchain-chroma

      # Step 4: Run unit tests
      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short

      # Step 5: Run tests with coverage (optional enhancement)
      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ --cov=src/medexrag --cov-report=term-missing --cov-fail-under=0
        continue-on-error: true  # Don't fail build on coverage threshold initially

  # ===========================================================================
  # Job 3: Docker Build Test (Optional - validates Dockerfiles)
  # ===========================================================================
  # Verifies Docker images can be built successfully
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only test that Dockerfiles are syntactically valid
      # Full build would take too long and require model downloads
      - name: Validate Dockerfile.base syntax
        run: docker build --check -f docker/Dockerfile.base .
        continue-on-error: true  # Syntax check only available in newer Docker

      - name: Test Docker Compose config
        run: docker compose -f docker/docker-compose.yml config --quiet
