# OpenTelemetry Collector Configuration for Medical X-Ray RAG Application
#
# This configuration receives traces from the application via OTLP protocol
# and exports them to Jaeger for visualization.
#
# Architecture:
#   Application (OTLP) --> Collector --> Jaeger
#                      --> Prometheus (metrics)
#                      --> Console (debug)

receivers:
  # OTLP receiver accepts traces and metrics from the application
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch processor groups spans before export for efficiency
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  # Memory limiter prevents out-of-memory situations
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Resource processor adds common attributes to all telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: service.namespace
        value: medical-rag
        action: upsert

exporters:
  # Jaeger exporter for trace visualization
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Debug exporter for troubleshooting (logs to collector stdout)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus exporter for collector metrics (optional)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel_collector

extensions:
  # Health check endpoint
  health_check:
    endpoint: 0.0.0.0:13133

  # Performance profiling (for debugging collector itself)
  pprof:
    endpoint: 0.0.0.0:1777

  # zPages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # Traces pipeline: receive from app, batch, export to Jaeger
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/jaeger, debug]

    # Metrics pipeline (if application sends OTLP metrics)
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
